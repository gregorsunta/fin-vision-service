# docker-compose.prod.yml
# ------------------------------------
# Production configuration.
# Databases (MySQL, Redis) run directly on the host, not in Docker.
#
# USAGE:
#   docker compose -f docker-compose.prod.yml up -d

services:
  api:
    build:
      context: .
      target: production
    command: node dist/api/index.js
    env_file: .env
    environment:
      - NODE_ENV=production
    ports:
      - "${API_PORT:-3000}:3000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./uploads:/app/uploads
    depends_on:
      - worker
    restart: always
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  worker:
    build:
      context: .
      target: production
    command: node dist/workers/index.js
    env_file: .env
    environment:
      - NODE_ENV=production
      - GOOGLE_APPLICATION_CREDENTIALS=/app/gcp-credentials.json
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./${GOOGLE_APPLICATION_CREDENTIALS:-gcp-credentials.json}:/app/gcp-credentials.json:ro
      - ./logs:/app/logs
    restart: always
