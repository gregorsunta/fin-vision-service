# docker-compose.yml
# ------------------------------------
# Local development: runs only infrastructure (MySQL, Redis).
# App services (api, worker) run locally via `npm run dev`.
#
# For production, use: docker compose -f docker-compose.prod.yml up -d

services:
  mysql:
    image: mysql:8.4
    restart: always
    environment:
      MYSQL_DATABASE: ${DB_NAME:-fin_vision_db}
      MYSQL_USER: ${DB_USER:-user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-password}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootpassword}
    ports:
      - "${DB_PORT:-3307}:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  redis:
    image: redis:7-alpine
    restart: always
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  cv-detector:
    build: ./cv-detector-service
    restart: unless-stopped
    environment:
      TORCH_NUM_THREADS: "${TORCH_NUM_THREADS:-2}"
      GD_BOX_THRESHOLD: "${GD_BOX_THRESHOLD:-0.12}"
      GD_TEXT_THRESHOLD: "${GD_TEXT_THRESHOLD:-0.12}"
      GD_MAX_AREA_FRACTION: "${GD_MAX_AREA_FRACTION:-0.70}"
      GD_NMS_IOU: "${GD_NMS_IOU:-0.30}"
    ports:
      - "${CV_DETECTOR_PORT:-8001}:8000"
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import urllib.request; urllib.request.urlopen(\"http://localhost:8000/health\")'"]
      interval: 30s
      timeout: 5s
      retries: 3
      # Allow up to 60 s for the model to load on cold start.
      start_period: 60s

volumes:
  mysql-data:
  redis-data:
